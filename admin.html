<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deal Way Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="css/admin.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script defer src="js/admin-config.js"></script>
  <script defer src="js/admin.js"></script>
</head>
<body>
  <header class="admin-header">
    <div>
      <h1>لوحة إدارة Deal Way</h1>
      <p>مراجعة الإعلانات، إدارة البلاغات، وحظر الحسابات المخالفة.</p>
    </div>
    <div class="admin-actions">
      <a class="ghost-btn" href="index.html"><i class="fa-solid fa-arrow-right"></i> رجوع للموقع</a>
      <button id="adminLoginBtn" class="primary-btn"><i class="fa-solid fa-fingerprint"></i> دخول الأدمن</button>
    </div>
  </header>

  <main class="admin-shell">
    <section id="accessPanel" class="notice-card">
      <i class="fa-solid fa-shield-halved"></i>
      <div>
        <h2>تسجيل دخول مطلوب</h2>
        <p>يجب أن يكون Pi UID الخاص بك موجودًا داخل ملف <b>js/admin-config.js</b>.</p>
      </div>
    </section>

    <section id="dashboard" class="hidden">
      <div class="stats-grid">
        <div class="stat-card"><span id="pendingCount">0</span><label>بانتظار المراجعة</label></div>
        <div class="stat-card"><span id="activeCount">0</span><label>منشور</label></div>
        <div class="stat-card"><span id="rejectedCount">0</span><label>مرفوض</label></div>
        <div class="stat-card"><span id="bannedCount">0</span><label>حسابات محظورة</label></div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="pending" onclick="switchTab('pending')">مراجعة الإعلانات</button>
        <button class="tab" data-tab="all" onclick="switchTab('all')">كل الإعلانات</button>
        <button class="tab" data-tab="users" onclick="switchTab('users')">المستخدمون</button>
        <button class="tab" data-tab="reports" onclick="switchTab('reports')">البلاغات</button>
      </div>

      <section id="tab-pending" class="tab-panel"></section>
      <section id="tab-all" class="tab-panel hidden"></section>
      <section id="tab-users" class="tab-panel hidden"></section>
      <section id="tab-reports" class="tab-panel hidden"></section>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
</body>
</html>
